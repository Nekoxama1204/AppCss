<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animaciones CSS - 2.4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-dark text-light d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">Proyecto CSS</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto nav-pills" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#social-tab" type="button" role="tab">Magic Social Menu</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#navbar-tab" type="button" role="tab">Animated Navbar</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="flex-grow-1 d-flex justify-content-center align-items-center container my-5">
        <div class="tab-content w-100 d-flex justify-content-center">
            
            <div class="tab-pane fade show active" id="social-tab" role="tabpanel">
                <div class="magic-menu" id="magicMenu">
                    <div class="toggle" id="toggleBtn">
                        <ion-icon name="share-social"></ion-icon>
                    </div>
                    <li style="--i:0;"><a href="#"><ion-icon name="logo-facebook"></ion-icon></a></li>
                    <li style="--i:1;"><a href="#"><ion-icon name="logo-whatsapp"></ion-icon></a></li>
                    <li style="--i:2;"><a href="#"><ion-icon name="logo-twitter"></ion-icon></a></li>
                    <li style="--i:3;"><a href="#"><ion-icon name="logo-reddit"></ion-icon></a></li>
                    <li style="--i:4;"><a href="#"><ion-icon name="logo-youtube"></ion-icon></a></li>
                    <li style="--i:5;"><a href="#"><ion-icon name="logo-github"></ion-icon></a></li>
                    <li style="--i:6;"><a href="#"><ion-icon name="logo-linkedin"></ion-icon></a></li>
                    <li style="--i:7;"><a href="#"><ion-icon name="logo-instagram"></ion-icon></a></li>
                </div>
            </div>

            <div class="tab-pane fade" id="navbar-tab" role="tabpanel">
                <div class="anim-navigation">
                    <ul>
                        <li class="list active">
                            <a href="#">
                                <span class="icon"><ion-icon name="home-outline"></ion-icon></span>
                                <span class="text">Home</span>
                            </a>
                        </li>
                        <li class="list">
                            <a href="#">
                                <span class="icon"><ion-icon name="person-outline"></ion-icon></span>
                                <span class="text">Profile</span>
                            </a>
                        </li>
                        <li class="list">
                            <a href="#">
                                <span class="icon"><ion-icon name="chatbubble-outline"></ion-icon></span>
                                <span class="text">Message</span>
                            </a>
                        </li>
                        <li class="list">
                            <a href="#">
                                <span class="icon"><ion-icon name="camera-outline"></ion-icon></span>
                                <span class="text">Photos</span>
                            </a>
                        </li>
                        <li class="list">
                            <a href="#">
                                <span class="icon"><ion-icon name="settings-outline"></ion-icon></span>
                                <span class="text">Settings</span>
                            </a>
                        </li>
                        <div class="indicator"></div>
                    </ul>
                </div>
            </div>

        </div>
    </main>

    <footer class="bg-dark border-top border-secondary text-center py-4 mt-auto">
        <div class="container text-secondary">
            <p class="mb-1 fw-bold text-light">Gael Quiroz Bautista</p>
            <p class="mb-0 small">Ingeniería en Sistemas Computacionales | Tecnológico Nacional de México Campus Pachuca</p>
            <p class="mb-0 small">&copy; 2026</p>
        </div>
    </footer>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
